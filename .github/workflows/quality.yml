name: quality

on:
  push:
  pull_request:

jobs:
  build-and-qa:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Lint static site
        run: pnpm run lint

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Playwright visual and accessibility smoke tests
        run: pnpm run qa
